specVersion: "3.0"
metadata:
  name: app-desktop
type: application
framework:
  name: OpenUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.uxap
    - name: themelib_sap_horizon
server:
  customMiddleware:
    # Proxy de desarrollo: redirige /servicio-campo al backend CAP local.
    # Reenvía el header Authorization → el login Basic (usuario mock) llega al backend.
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: true
        backend:
          - path: /servicio-campo
            url: http://localhost:4004
