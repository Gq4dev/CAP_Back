<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Service — Despacho</title>
  <!-- Dev: inyecta Basic auth (sessionStorage 'fsmAuth') en cada XHR para poder
       cambiar de usuario desde el diálogo de login sin el prompt nativo del navegador. -->
  <script>
    (function () {
      var fnSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function () {
        try {
          var sAuth = window.sessionStorage.getItem("fsmAuth");
          if (sAuth) { this.setRequestHeader("Authorization", sAuth); }
        } catch (e) { /* sessionStorage no disponible */ }
        return fnSend.apply(this, arguments);
      };
    })();
  </script>
  <script
    id="sap-ui-bootstrap"
    src="resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resource-roots='{"fsm.desktop": "./"}'
    data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
    data-sap-ui-compat-version="edge"
    data-sap-ui-async="true"
    data-sap-ui-preload="async">
  </script>
</head>
<body class="sapUiBody">
  <div
    data-sap-ui-component
    data-name="fsm.desktop"
    data-id="container"
    data-settings='{"id": "despacho"}'
    style="height: 100%">
  </div>
</body>
</html>
